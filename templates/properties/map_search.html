{% extends 'base/base.html' %}{% load static i18n %}
{% block title %}{% trans 'Map Search' %} - RENTPLAY{% endblock %}
{% block content %}
<section class="hero animate-fade" style="padding:2rem;"><div class="hero-content"><h1><i class="fas fa-map"></i> {% trans 'Search on Map' %}</h1></div></section>
<div class="map-container animate-fade">
    <div id="map" style="height:600px;width:100%;border-radius:var(--radius-lg);"></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
var properties = {{ properties_json|safe }};
var map = L.map('map').setView([24.7136, 46.6753], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
}).addTo(map);

// Custom marker icon
var propertyIcon = L.divIcon({
    className: 'property-marker',
    html: '<div style="background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:white;padding:6px 10px;border-radius:20px;font-weight:700;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);white-space:nowrap;"><i class="fas fa-home"></i> ' + (properties.length) + '</div>',
    iconSize: null,
    iconAnchor: [20, 20]
});

// Add markers
if (properties.length > 0) {
    var markers = [];
    properties.forEach(function(p) {
        if (p.lat && p.lng) {
            var marker = L.marker([p.lat, p.lng]).addTo(map);
            var popupContent = '<div style="min-width:200px;">';
            if (p.image) {
                popupContent += '<img src="' + p.image + '" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;" onerror="this.style.display=\'none\'">';
            }
            popupContent += '<strong style="display:block;margin-bottom:4px;">' + p.title + '</strong>';
            popupContent += '<span style="color:#10b981;font-weight:700;">' + p.price + ' SAR/month</span>';
            popupContent += '<br><a href="' + p.url + '" style="display:inline-block;margin-top:8px;padding:6px 12px;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:white;border-radius:6px;text-decoration:none;font-size:12px;">{% trans "View Details" %}</a>';
            popupContent += '</div>';
            marker.bindPopup(popupContent);
            markers.push(marker);
        }
    });
    
    // Fit bounds if we have markers
    if (markers.length > 0) {
        var group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
    }
} else {
    // Show message if no properties
    L.popup()
        .setLatLng([24.7136, 46.6753])
        .setContent('<p style="text-align:center;">{% trans "No properties with location data found." %}</p>')
        .openOn(map);
}
</script>
{% endblock %}
