{% extends 'base/base.html' %}{% load static i18n %}
{% block title %}{% trans 'Reset Password' %} - RENTPLAY{% endblock %}
{% block content %}
<div class="login-page animate-fade">
    <div class="login-container">
        <div class="login-header">
            <a href="{% url 'rentplay:index' %}" class="logo" style="justify-content:center;margin-bottom:0.5rem;">
                <div class="logo-box"><img src="{% static 'images/rentplay_logo_nav.png' %}" alt="RENTPLAY" class="logo-img"></div>
                <span class="logo-text">RENTPLAY</span>
            </a>
            <p class="login-subtitle">{% trans 'Enter your email to reset your password' %}</p>
        </div>
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom:1.25rem;">
                <label class="form-label"><i class="fas fa-envelope"></i> {% trans 'Email' %}</label>
                <input type="email" name="email" class="form-input" placeholder="{% trans 'your@email.com' %}" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;"><i class="fas fa-paper-plane"></i> {% trans 'Send Reset Link' %}</button>
        </form>
        <a href="{% url 'rentplay:login' %}" class="back-link"><i class="fas fa-arrow-right"></i> {% trans 'Back to Login' %}</a>
    </div>
</div>
{% endblock %}
