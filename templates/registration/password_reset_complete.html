{% extends 'base/base.html' %}{% load static i18n %}
{% block title %}{% trans 'Password Reset' %} - RENTPLAY{% endblock %}
{% block content %}
<div class="login-page animate-fade">
    <div class="login-container">
        <div class="login-header">
            <a href="{% url 'rentplay:index' %}" class="logo" style="justify-content:center;margin-bottom:0.5rem;">
                <div class="logo-box"><img src="{% static 'images/rentplay_logo_nav.png' %}" alt="RENTPLAY" class="logo-img"></div>
                <span class="logo-text">RENTPLAY</span>
            </a>
            <p class="login-subtitle">{% trans 'Success!' %}</p>
        </div>
        <div class="alert alert-success" style="text-align:center;">
            <i class="fas fa-check-circle" style="font-size:3rem;color:var(--success);margin-bottom:1rem;display:block;"></i>
            <p>{% trans 'Your password has been reset successfully.' %}</p>
        </div>
        <a href="{% url 'rentplay:login' %}" class="btn btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> {% trans 'Login' %}</a>
    </div>
</div>
{% endblock %}
