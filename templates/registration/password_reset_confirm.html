{% extends 'base/base.html' %}{% load static i18n %}
{% block title %}{% trans 'New Password' %} - RENTPLAY{% endblock %}
{% block content %}
<div class="login-page animate-fade">
    <div class="login-container">
        <div class="login-header">
            <a href="{% url 'rentplay:index' %}" class="logo" style="justify-content:center;margin-bottom:0.5rem;">
                <div class="logo-box"><img src="{% static 'images/rentplay_logo_nav.png' %}" alt="RENTPLAY" class="logo-img"></div>
                <span class="logo-text">RENTPLAY</span>
            </a>
            <p class="login-subtitle">{% trans 'Enter your new password' %}</p>
        </div>
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom:1.25rem;">
                <label class="form-label"><i class="fas fa-lock"></i> {% trans 'New Password' %}</label>
                <input type="password" name="new_password1" class="form-input" required>
            </div>
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label class="form-label"><i class="fas fa-lock"></i> {% trans 'Confirm Password' %}</label>
                <input type="password" name="new_password2" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;"><i class="fas fa-save"></i> {% trans 'Reset Password' %}</button>
        </form>
    </div>
</div>
{% endblock %}
